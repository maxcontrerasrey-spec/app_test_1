name: Audit Supabase Migrations

on:
  push:
    paths:
      - "supabase/**"
      - "scripts/audit-supabase-migrations.mjs"
      - "scripts/audit-supabase-security.mjs"
      - "package.json"
      - ".github/workflows/audit-supabase-migrations.yml"
  pull_request:
    paths:
      - "supabase/**"
      - "scripts/audit-supabase-migrations.mjs"
      - "scripts/audit-supabase-security.mjs"
      - "package.json"
      - ".github/workflows/audit-supabase-migrations.yml"

jobs:
  audit-migrations:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Enforce migration baseline
        run: npm run audit:migrations

      - name: Audit Supabase security patterns
        run: npm run audit:supabase-security
