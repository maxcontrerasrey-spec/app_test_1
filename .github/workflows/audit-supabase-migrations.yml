name: Audit Enterprise Guardrails

on:
  push:
    paths:
      - "docs/**"
      - "eees/**"
      - "supabase/**"
      - "tasks/todo.md"
      - "tasks/lessons.md"
      - "src/app/router/AppRouter.tsx"
      - "src/app/router/routeModules.ts"
      - "scripts/audit-enterprise-docs.mjs"
      - "scripts/audit-eees-guardian.mjs"
      - "scripts/audit-buk-sync-guards.mjs"
      - "scripts/audit-frontend-auth-smoke-matrix.mjs"
      - "scripts/audit-frontend-auth-smoke-secrets.mjs"
      - "scripts/audit-onboarding-legacy-guards.mjs"
      - "scripts/audit-route-role-smoke.mjs"
      - "scripts/audit-supabase-migrations.mjs"
      - "scripts/audit-supabase-security.mjs"
      - "scripts/smoke-frontend-auth-candidates.mjs"
      - "scripts/smoke-frontend-authenticated.mjs"
      - "scripts/smoke-frontend-authenticated-matrix.mjs"
      - "scripts/smoke-frontend-routes.mjs"
      - "tests/smoke/**"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/audit-supabase-migrations.yml"
  pull_request:
    paths:
      - "docs/**"
      - "eees/**"
      - "supabase/**"
      - "tasks/todo.md"
      - "tasks/lessons.md"
      - "src/app/router/AppRouter.tsx"
      - "src/app/router/routeModules.ts"
      - "scripts/audit-enterprise-docs.mjs"
      - "scripts/audit-eees-guardian.mjs"
      - "scripts/audit-buk-sync-guards.mjs"
      - "scripts/audit-frontend-auth-smoke-matrix.mjs"
      - "scripts/audit-frontend-auth-smoke-secrets.mjs"
      - "scripts/audit-onboarding-legacy-guards.mjs"
      - "scripts/audit-route-role-smoke.mjs"
      - "scripts/audit-supabase-migrations.mjs"
      - "scripts/audit-supabase-security.mjs"
      - "scripts/smoke-frontend-auth-candidates.mjs"
      - "scripts/smoke-frontend-authenticated.mjs"
      - "scripts/smoke-frontend-authenticated-matrix.mjs"
      - "scripts/smoke-frontend-routes.mjs"
      - "tests/smoke/**"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/audit-supabase-migrations.yml"

jobs:
  audit-enterprise-guardrails:
    runs-on: ubuntu-latest
    env:
      FRONTEND_AUTH_SMOKE_EMAIL: ${{ secrets.FRONTEND_AUTH_SMOKE_EMAIL }}
      FRONTEND_AUTH_SMOKE_PASSWORD: ${{ secrets.FRONTEND_AUTH_SMOKE_PASSWORD }}
      FRONTEND_AUTH_SMOKE_HOME_EMAIL: ${{ secrets.FRONTEND_AUTH_SMOKE_HOME_EMAIL }}
      FRONTEND_AUTH_SMOKE_HOME_PASSWORD: ${{ secrets.FRONTEND_AUTH_SMOKE_HOME_PASSWORD }}
      FRONTEND_AUTH_SMOKE_ADMIN_BI_EMAIL: ${{ secrets.FRONTEND_AUTH_SMOKE_ADMIN_BI_EMAIL }}
      FRONTEND_AUTH_SMOKE_ADMIN_BI_PASSWORD: ${{ secrets.FRONTEND_AUTH_SMOKE_ADMIN_BI_PASSWORD }}
      FRONTEND_AUTH_SMOKE_RECLUTAMIENTO_EMAIL: ${{ secrets.FRONTEND_AUTH_SMOKE_RECLUTAMIENTO_EMAIL }}
      FRONTEND_AUTH_SMOKE_RECLUTAMIENTO_PASSWORD: ${{ secrets.FRONTEND_AUTH_SMOKE_RECLUTAMIENTO_PASSWORD }}
      FRONTEND_AUTH_SMOKE_CONTROL_CONTRATOS_EMAIL: ${{ secrets.FRONTEND_AUTH_SMOKE_CONTROL_CONTRATOS_EMAIL }}
      FRONTEND_AUTH_SMOKE_CONTROL_CONTRATOS_PASSWORD: ${{ secrets.FRONTEND_AUTH_SMOKE_CONTROL_CONTRATOS_PASSWORD }}
      FRONTEND_AUTH_SMOKE_ADMINISTRATIVO_EMAIL: ${{ secrets.FRONTEND_AUTH_SMOKE_ADMINISTRATIVO_EMAIL }}
      FRONTEND_AUTH_SMOKE_ADMINISTRATIVO_PASSWORD: ${{ secrets.FRONTEND_AUTH_SMOKE_ADMINISTRATIVO_PASSWORD }}
      FRONTEND_AUTH_SMOKE_JEFE_ADMINISTRATIVO_EMAIL: ${{ secrets.FRONTEND_AUTH_SMOKE_JEFE_ADMINISTRATIVO_EMAIL }}
      FRONTEND_AUTH_SMOKE_JEFE_ADMINISTRATIVO_PASSWORD: ${{ secrets.FRONTEND_AUTH_SMOKE_JEFE_ADMINISTRATIVO_PASSWORD }}
      FRONTEND_AUTH_SMOKE_GERENCIA_EMAIL: ${{ secrets.FRONTEND_AUTH_SMOKE_GERENCIA_EMAIL }}
      FRONTEND_AUTH_SMOKE_GERENCIA_PASSWORD: ${{ secrets.FRONTEND_AUTH_SMOKE_GERENCIA_PASSWORD }}
      FRONTEND_AUTH_SMOKE_DIRECTOR_EJE_EMAIL: ${{ secrets.FRONTEND_AUTH_SMOKE_DIRECTOR_EJE_EMAIL }}
      FRONTEND_AUTH_SMOKE_DIRECTOR_EJE_PASSWORD: ${{ secrets.FRONTEND_AUTH_SMOKE_DIRECTOR_EJE_PASSWORD }}
      FRONTEND_AUTH_SMOKE_DIRECTOR_OP_EMAIL: ${{ secrets.FRONTEND_AUTH_SMOKE_DIRECTOR_OP_EMAIL }}
      FRONTEND_AUTH_SMOKE_DIRECTOR_OP_PASSWORD: ${{ secrets.FRONTEND_AUTH_SMOKE_DIRECTOR_OP_PASSWORD }}
      FRONTEND_AUTH_SMOKE_GERENTE_GENERAL_EMAIL: ${{ secrets.FRONTEND_AUTH_SMOKE_GERENTE_GENERAL_EMAIL }}
      FRONTEND_AUTH_SMOKE_GERENTE_GENERAL_PASSWORD: ${{ secrets.FRONTEND_AUTH_SMOKE_GERENTE_GENERAL_PASSWORD }}
      FRONTEND_AUTH_SMOKE_OPERACIONES_EMAIL: ${{ secrets.FRONTEND_AUTH_SMOKE_OPERACIONES_EMAIL }}
      FRONTEND_AUTH_SMOKE_OPERACIONES_PASSWORD: ${{ secrets.FRONTEND_AUTH_SMOKE_OPERACIONES_PASSWORD }}
      FRONTEND_AUTH_SMOKE_OPERATIONS_L1_EMAIL: ${{ secrets.FRONTEND_AUTH_SMOKE_OPERATIONS_L1_EMAIL }}
      FRONTEND_AUTH_SMOKE_OPERATIONS_L1_PASSWORD: ${{ secrets.FRONTEND_AUTH_SMOKE_OPERATIONS_L1_PASSWORD }}
      FRONTEND_AUTH_SMOKE_OPERATIONS_L2_EMAIL: ${{ secrets.FRONTEND_AUTH_SMOKE_OPERATIONS_L2_EMAIL }}
      FRONTEND_AUTH_SMOKE_OPERATIONS_L2_PASSWORD: ${{ secrets.FRONTEND_AUTH_SMOKE_OPERATIONS_L2_PASSWORD }}
      FRONTEND_AUTH_SMOKE_CERTIFICACIONES_EMAIL: ${{ secrets.FRONTEND_AUTH_SMOKE_CERTIFICACIONES_EMAIL }}
      FRONTEND_AUTH_SMOKE_CERTIFICACIONES_PASSWORD: ${{ secrets.FRONTEND_AUTH_SMOKE_CERTIFICACIONES_PASSWORD }}
      FRONTEND_AUTH_SMOKE_INSTRUCTOR_EMAIL: ${{ secrets.FRONTEND_AUTH_SMOKE_INSTRUCTOR_EMAIL }}
      FRONTEND_AUTH_SMOKE_INSTRUCTOR_PASSWORD: ${{ secrets.FRONTEND_AUTH_SMOKE_INSTRUCTOR_PASSWORD }}
      FRONTEND_AUTH_SMOKE_MATRIX_REQUIRED: ${{ vars.FRONTEND_AUTH_SMOKE_MATRIX_REQUIRED }}
      VITE_SUPABASE_URL: ${{ vars.VITE_SUPABASE_URL }}
      VITE_SUPABASE_ANON_KEY: ${{ vars.VITE_SUPABASE_ANON_KEY }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7.0.1

      - name: Setup Node.js
        uses: actions/setup-node@v7.0.0
        with:
          node-version: "24"

      - name: Install dependencies
        run: npm ci

      - name: Setup Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Audit Enterprise documentation coverage
        run: npm run audit:enterprise-docs

      - name: Audit BUK sync duplicate guards
        run: npm run audit:buk-sync-guards

      - name: Check BUK sync Edge Function
        run: npm run check:edge:sync-buk-candidates

      - name: Smoke route and role guardrails
        run: npm run audit:route-role-smoke

      - name: Audit authenticated frontend smoke matrix
        run: npm run audit:frontend-auth-smoke-matrix

      - name: Audit onboarding legacy guards
        run: npm run audit:onboarding-legacy-guards

      - name: Install Chromium for frontend smoke
        run: npx playwright install --with-deps chromium

      - name: Smoke frontend public and protected routes
        run: npm run smoke:frontend-routes

      - name: EEES Guardian
        run: npm run guardian

      - name: Smoke frontend authenticated route
        if: ${{ env.FRONTEND_AUTH_SMOKE_EMAIL != '' && env.FRONTEND_AUTH_SMOKE_PASSWORD != '' && env.VITE_SUPABASE_URL != '' && env.VITE_SUPABASE_ANON_KEY != '' }}
        env:
          FRONTEND_AUTH_SMOKE_REQUIRED: "1"
          FRONTEND_AUTH_SMOKE_PATH: "/"
        run: npm run smoke:frontend-authenticated

      - name: Smoke frontend authenticated scenario matrix
        run: npm run smoke:frontend-authenticated-matrix

      - name: Enforce migration baseline
        run: npm run audit:migrations

      - name: Audit Supabase security patterns
        run: npm run audit:supabase-security
