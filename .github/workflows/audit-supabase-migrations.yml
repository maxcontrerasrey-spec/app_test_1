name: Audit Enterprise Guardrails

on:
  push:
    paths:
      - "docs/**"
      - "supabase/**"
      - "tasks/todo.md"
      - "tasks/lessons.md"
      - "src/app/router/AppRouter.tsx"
      - "src/app/router/routeModules.ts"
      - "scripts/audit-enterprise-docs.mjs"
      - "scripts/audit-route-role-smoke.mjs"
      - "scripts/audit-supabase-migrations.mjs"
      - "scripts/audit-supabase-security.mjs"
      - "package.json"
      - ".github/workflows/audit-supabase-migrations.yml"
  pull_request:
    paths:
      - "docs/**"
      - "supabase/**"
      - "tasks/todo.md"
      - "tasks/lessons.md"
      - "src/app/router/AppRouter.tsx"
      - "src/app/router/routeModules.ts"
      - "scripts/audit-enterprise-docs.mjs"
      - "scripts/audit-route-role-smoke.mjs"
      - "scripts/audit-supabase-migrations.mjs"
      - "scripts/audit-supabase-security.mjs"
      - "package.json"
      - ".github/workflows/audit-supabase-migrations.yml"

jobs:
  audit-enterprise-guardrails:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Audit Enterprise documentation coverage
        run: npm run audit:enterprise-docs

      - name: Smoke route and role guardrails
        run: npm run audit:route-role-smoke

      - name: Enforce migration baseline
        run: npm run audit:migrations

      - name: Audit Supabase security patterns
        run: npm run audit:supabase-security
