name: Sync BUK Employees

on:
  schedule:
    - cron: '0 4 * * *' # Corre a las 04:00 AM UTC todos los días
  workflow_dispatch: # Permite ejecución manual desde GitHub

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Dependencies
        run: npm install @supabase/supabase-js

      - name: Run BUK Sync Script
        env:
          BUK_EMPLOYEES_URL: ${{ secrets.BUK_EMPLOYEES_URL }}
          BUK_AREAS_URL: ${{ secrets.BUK_AREAS_URL }}
          BUK_AUTH_TOKEN: ${{ secrets.BUK_AUTH_TOKEN }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ vars.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: node scripts/sync-buk-employees.mjs
