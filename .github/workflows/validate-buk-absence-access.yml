name: Validate BUK Absence Access

on:
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    concurrency:
      group: validate-buk-absence-access-${{ github.workflow }}-${{ github.ref }}
      cancel-in-progress: true
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install Dependencies
        run: npm ci --omit=dev

      - name: Validate required variables
        env:
          BUK_EMPLOYEES_URL: ${{ secrets.BUK_EMPLOYEES_URL }}
          BUK_AUTH_TOKEN: ${{ secrets.BUK_AUTH_TOKEN }}
        run: |
          test -n "$BUK_AUTH_TOKEN" || { echo "Missing BUK_AUTH_TOKEN"; exit 1; }

      - name: Validate BUK vacations and absences access
        env:
          BUK_EMPLOYEES_URL: ${{ secrets.BUK_EMPLOYEES_URL }}
          BUK_AUTH_TOKEN: ${{ secrets.BUK_AUTH_TOKEN }}
        run: node scripts/validate-buk-absence-access.mjs
